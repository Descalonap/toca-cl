<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Neobrutalist — toca.</title>
<style>
:root {
  --bg: #f7f500;
  --text: #000;
  --border: #000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  padding: 20px;
  display: flex; justify-content: center; min-height: 100vh;
}
.card {
  width: 100%; max-width: 400px;
  background: #fff;
  border: 4px solid var(--border);
  box-shadow: 8px 8px 0px var(--border);
  padding: 40px 20px;
  text-align: left;
}
.avatar {
  width: 80px; height: 80px;
  background: #ff00ff;
  border: 3px solid var(--border);
  margin-bottom: 20px;
}
h1 { font-size: 32px; border-bottom: 4px solid var(--border); display: inline-block; margin-bottom: 10px; }
.role { font-size: 16px; margin-bottom: 30px; text-transform: uppercase; }
.link-btn {
  display: block;
  padding: 15px;
  margin-bottom: 12px;
  background: #00ffff;
  border: 3px solid var(--border);
  color: #000;
  text-decoration: none;
  box-shadow: 4px 4px 0px var(--border);
  transition: all 0.1s;
}
.link-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--border); }
.save-btn {
  width: 100%;
  padding: 18px;
  background: #ff00ff;
  border: 3px solid var(--border);
  font-weight: 900;
  cursor: pointer;
  box-shadow: 4px 4px 0px var(--border);
  margin-top: 20px;
  text-transform: uppercase;
}
.powered { margin-top: 30px; font-size: 11px; opacity: 0.6; }
</style>
</head>
<body>
<div class="card">
  <div class="avatar"></div>
  <h1>ARTE.</h1>
  <p class="role">Tatuador &amp; Ilustrador</p>
  <div class="links">
    <a href="#" class="link-btn">PORTAFOLIO</a>
    <a href="#" class="link-btn">INSTAGRAM</a>
    <a href="#" class="link-btn">WHATSAPP</a>
  </div>
  <button class="save-btn">GUARDAR CONTACTO</button>
  <div class="powered">POWERED BY TOCA.</div>
</div>
</body></html>
